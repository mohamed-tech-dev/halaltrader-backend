spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/halaltrader}
    username: ${DB_USER:halal}
    password: ${DB_PASS:halal123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  models:
    halal-screener: claude-opus-4-6
    market-analyst: claude-sonnet-4-6
    risk-manager: claude-sonnet-4-6
    decision: claude-opus-4-6
    performance: claude-haiku-4-5-20251001

trading:
  scheduler:
    cron: "0 */30 * * * *"
  simulation:
    initial-cash: 100000

market-data:
  base-url: ${MARKET_DATA_URL:http://localhost:8081}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
