services:
  postgres:
    image: postgres:15
    container_name: halaltrader-postgres
    environment:
      POSTGRES_DB: halaltrader
      POSTGRES_USER: halal
      POSTGRES_PASSWORD: halal123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U halal -d halaltrader"]
      interval: 10s
      timeout: 5s
      retries: 5

  # market-data runs on the host (not in Docker) during development
  # Yahoo Finance blocks datacenter/Docker IPs — run locally with:
  #   cd market-data && pip install -r requirements.txt && uvicorn main:app --port 8081

volumes:
  postgres_data:
